# Worker Orchestrator - Manages simulation containers via Docker socket
# Slim container: Node.js only, no Java/Forge

services:
  worker:
    image: ${IMAGE_NAME:-magic-bracket-worker}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magic-bracket-worker
    restart: unless-stopped
    env_file:
      - .env

    environment:
      # GCP project — optional. Controls Sentry environment tag and the
      # Secret Manager config loader (graceful fallback if SA key absent).
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-magic-bracket-simulator}
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/sa.json

      # API — WORKER_SECRET typically comes from Secret Manager at startup
      # (or can be set directly here / in .env). URL is not secret.
      - API_URL=${API_URL:-https://api--magic-bracket-simulator.us-central1.hosted.app}

      # Worker
      - WORKER_ID=${WORKER_ID:-}
      - JOBS_DIR=${JOBS_DIR:-/tmp/mbs-jobs}

      # Simulation image — pinned to a SHA256 digest so an attacker who
      # compromises the registry can't push a malicious :latest the worker
      # would auto-pull on next restart. To upgrade to a newer build:
      #
      #   1. docker pull ghcr.io/tytaniumdev/magicbracketsimulator/simulation:latest
      #   2. docker inspect --format='{{index .RepoDigests 0}}' \
      #        ghcr.io/tytaniumdev/magicbracketsimulator/simulation:latest
      #   3. Copy the printed `@sha256:...` string into the default below,
      #      commit, and redeploy the worker.
      #
      # Override via env var (e.g. for local testing with a specific build):
      #   SIMULATION_IMAGE=ghcr.io/.../simulation:my-branch docker compose up
      - SIMULATION_IMAGE=${SIMULATION_IMAGE:-ghcr.io/tytaniumdev/magicbracketsimulator/simulation@sha256:330594cdd7a90a50d2c66c07af3674ab451dad489665cd63a927c57f730fc50e}

      # Worker owner email (for frontend UI ownership)
      - WORKER_OWNER_EMAIL=${WORKER_OWNER_EMAIL:-}

      # Worker API for push-based control (config, cancel, notify, drain)
      - WORKER_API_PORT=${WORKER_API_PORT:-9090}
      - WORKER_API_URL=${WORKER_API_URL:-}

      # Docker CLI API version — worker image ships Docker CLI v20 (API 1.41) but
      # newer daemons (v25+) require API ≥1.44. Override to negotiate correctly.
      - DOCKER_API_VERSION=1.44

      # Opt-in read-only filesystem for simulation containers. When set to 1,
      # each `docker run` for a simulation passes --read-only plus tmpfs
      # mounts for the paths Forge writes to. Verified end-to-end against
      # a real 4-player Commander game. See worker/src/docker-runner.ts
      # for the exact flags.
      - SIMULATION_READONLY=${SIMULATION_READONLY:-1}

    # Grant access to the host Docker socket (GID varies by runtime: Colima=991, Linux=999, etc.)
    # DOCKER_SOCK_GID is set by setup-worker.sh; falls back to 0 (root) if unset.
    group_add:
      - "${DOCKER_SOCK_GID:-0}"

    volumes:
      # Mount Docker socket so worker can spawn simulation containers
      - /var/run/docker.sock:/var/run/docker.sock

      # Shared temp directory for deck/log files (worker writes, simulation containers read/write)
      - ${JOBS_DIR:-/tmp/mbs-jobs}:${JOBS_DIR:-/tmp/mbs-jobs}

      # GCP service account key — only used by the Secret Manager config
      # loader (to read WORKER_SECRET etc.) and Sentry initialization.
      # Fine to omit if you set WORKER_SECRET via .env directly; the
      # Secret Manager call fails gracefully and falls back to env.
      - ${SA_KEY_PATH:-${GOOGLE_APPLICATION_CREDENTIALS:-~/.config/gcloud/application_default_credentials.json}}:/secrets/sa.json:ro

    # Resource limits — worker itself is lightweight (Node.js only)
    # Simulation containers have their own resource limits
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
