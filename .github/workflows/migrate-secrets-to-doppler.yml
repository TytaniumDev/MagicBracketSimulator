name: Migrate Secrets to Doppler
on:
  workflow_dispatch: # Manual trigger only

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Push secrets to Doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          API_URL: ${{ secrets.API_URL }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          PUBSUB_SUBSCRIPTION: ${{ secrets.PUBSUB_SUBSCRIPTION }}
          PUBSUB_WORKER_REPORT_IN_SUBSCRIPTION: ${{ secrets.PUBSUB_WORKER_REPORT_IN_SUBSCRIPTION }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_PAT: ${{ secrets.SENTRY_PAT }}
        run: |
          doppler secrets set \
            GCP_WORKLOAD_IDENTITY_PROVIDER="${GCP_WORKLOAD_IDENTITY_PROVIDER}" \
            GCP_SERVICE_ACCOUNT="${GCP_SERVICE_ACCOUNT}" \
            GCP_SA_KEY="${GCP_SA_KEY}" \
            GOOGLE_CLOUD_PROJECT="${GOOGLE_CLOUD_PROJECT}" \
            FIREBASE_TOKEN="${FIREBASE_TOKEN}" \
            VITE_FIREBASE_API_KEY="${VITE_FIREBASE_API_KEY}" \
            VITE_FIREBASE_AUTH_DOMAIN="${VITE_FIREBASE_AUTH_DOMAIN}" \
            VITE_FIREBASE_PROJECT_ID="${VITE_FIREBASE_PROJECT_ID}" \
            VITE_FIREBASE_STORAGE_BUCKET="${VITE_FIREBASE_STORAGE_BUCKET}" \
            VITE_FIREBASE_MESSAGING_SENDER_ID="${VITE_FIREBASE_MESSAGING_SENDER_ID}" \
            VITE_FIREBASE_APP_ID="${VITE_FIREBASE_APP_ID}" \
            API_URL="${API_URL}" \
            GCS_BUCKET="${GCS_BUCKET}" \
            PUBSUB_SUBSCRIPTION="${PUBSUB_SUBSCRIPTION}" \
            PUBSUB_WORKER_REPORT_IN_SUBSCRIPTION="${PUBSUB_WORKER_REPORT_IN_SUBSCRIPTION}" \
            WORKER_SECRET="${WORKER_SECRET}" \
            GHCR_USER="${GHCR_USER}" \
            GHCR_TOKEN="${GHCR_TOKEN}" \
            SENTRY_DSN="${SENTRY_DSN}" \
            SENTRY_AUTH_TOKEN="${SENTRY_AUTH_TOKEN}" \
            SENTRY_ORG="${SENTRY_ORG}" \
            SENTRY_PROJECT="${SENTRY_PROJECT}" \
            SENTRY_PAT="${SENTRY_PAT}" \
            --no-interactive
          echo "Migration complete. Verify with: doppler secrets --only-names"
