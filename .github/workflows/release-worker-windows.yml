name: Release magic-bracket-simulator (Windows)

# Triggered:
#   - automatically on every push to `main` (so each merged PR produces
#     a prerelease build that users can install + Sparkle can pick up),
#   - on push of a tag matching `worker-v*` for official releases,
#   - manually via the workflow_dispatch button.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "worker-v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version + release tag
        id: version
        shell: bash
        env:
          BUILD_NUM: ${{ github.run_number }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          SHA_SHORT="${SHA:0:7}"
          BASE=$(awk '/^version:/{print $2}' worker_flutter/pubspec.yaml \
            | cut -d'+' -f1)
          NEW="${BASE}+${BUILD_NUM}"
          sed -i.bak "s/^version: .*/version: ${NEW}/" worker_flutter/pubspec.yaml
          rm -f worker_flutter/pubspec.yaml.bak
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "build=${BUILD_NUM}" >> "$GITHUB_OUTPUT"
          if [[ "${REF}" == refs/tags/* ]]; then
            echo "tag=${REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=${REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=build-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
            echo "name=Build ${BUILD_NUM} (${SHA_SHORT})" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Will publish version ${NEW} on ref ${REF}"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get
        working-directory: worker_flutter
        run: flutter pub get

      - name: flutter build windows --release
        working-directory: worker_flutter
        run: flutter build windows --release

      - name: Package release as zip
        working-directory: worker_flutter
        shell: pwsh
        run: |
          $src = "build/windows/x64/runner/Release"
          if (-not (Test-Path $src)) {
            $src = "build/windows/runner/Release"
          }
          $dst = "build/worker_flutter-windows.zip"
          if (Test-Path $dst) { Remove-Item $dst }
          Compress-Archive -Path "$src/*" -DestinationPath $dst
          Get-ChildItem $dst

      - name: Sign zip for WinSparkle (DSA)
        env:
          SPARKLE_DSA_PRIVATE_KEY: ${{ secrets.SPARKLE_DSA_PRIVATE_KEY }}
          TAG: ${{ steps.version.outputs.tag }}
          VER: ${{ steps.version.outputs.version }}
        shell: bash
        working-directory: worker_flutter
        run: |
          if [ -z "$SPARKLE_DSA_PRIVATE_KEY" ]; then
            echo "::error::SPARKLE_DSA_PRIVATE_KEY is unset" >&2
            exit 1
          fi
          KEY_FILE=$(mktemp)
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s' "$SPARKLE_DSA_PRIVATE_KEY" > "$KEY_FILE"
          ZIP=build/worker_flutter-windows.zip
          LEN=$(wc -c < "$ZIP")
          SIG=$(openssl dgst -sha1 -binary < "$ZIP" \
            | openssl dgst -sha1 -sign "$KEY_FILE" \
            | openssl enc -base64 -A)
          if [ -z "$SIG" ]; then
            echo "::error::DSA signing produced an empty signature" >&2
            exit 1
          fi
          echo "WinSparkle signature: $SIG (length: $LEN)"
          jq -n --arg sig "$SIG" --arg len "$LEN" \
                --arg ref "$TAG" --arg ver "$VER" \
            '{tag: $ref, version: $ver, dsaSignature: $sig, length: ($len|tonumber)}' \
            > build/sparkle-manifest-windows.json
          cat build/sparkle-manifest-windows.json

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: magic-bracket-simulator-windows
          path: |
            worker_flutter/build/worker_flutter-windows.zip
            worker_flutter/build/sparkle-manifest-windows.json
          if-no-files-found: error

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: |
            worker_flutter/build/worker_flutter-windows.zip
            worker_flutter/build/sparkle-manifest-windows.json
          fail_on_unmatched_files: true
