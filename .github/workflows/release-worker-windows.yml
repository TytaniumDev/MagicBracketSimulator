name: Release magic-bracket-simulator (Windows)

# Triggered manually or on push of a tag matching `worker-v*`. Builds
# the Flutter Windows release, zips it, and attaches it to the GitHub
# Release that the matching macOS workflow also targets.
#
# Code signing: NOT done. The .exe ships unsigned; users see a
# SmartScreen "Windows protected your PC" dialog on first launch and
# have to click "More info → Run anyway". Buying an Authenticode cert
# (or building a Microsoft Trusted-Signing reputation) is the long-term
# fix; see worker_flutter/macos/fastlane/SETUP.md.
#
# WinSparkle auto-update: enabled. Each zip gets a DSA signature
# (SHA1-of-zip signed with the SPARKLE_DSA_PRIVATE_KEY secret) emitted
# in a `sparkle-manifest-windows.json` next to the zip. The matching
# DSA public key is baked into the .exe via Runner.rc's `DSAPub`
# resource — without it WinSparkle would refuse to install updates.

on:
  workflow_dispatch:
  push:
    tags:
      - "worker-v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: flutter pub get
        working-directory: worker_flutter
        run: flutter pub get

      - name: flutter build windows --release
        working-directory: worker_flutter
        run: flutter build windows --release

      - name: Package release as zip
        working-directory: worker_flutter
        shell: pwsh
        run: |
          $src = "build/windows/x64/runner/Release"
          if (-not (Test-Path $src)) {
            $src = "build/windows/runner/Release"
          }
          $dst = "build/worker_flutter-windows.zip"
          if (Test-Path $dst) { Remove-Item $dst }
          Compress-Archive -Path "$src/*" -DestinationPath $dst
          Get-ChildItem $dst

      - name: Sign zip for WinSparkle (DSA)
        # WinSparkle 0.8.x verifies update zips against the embedded
        # DSAPub resource using a SHA1 + DSA signature, base64-encoded.
        # The recipe matches WinSparkle's sign_update.bat:
        #   openssl dgst -sha1 -binary < zip
        #     | openssl dgst -sha1 -sign priv.pem
        #     | openssl enc -base64
        # Without this signature on the appcast entry, WinSparkle marks
        # the update available but refuses to install it.
        env:
          SPARKLE_DSA_PRIVATE_KEY: ${{ secrets.SPARKLE_DSA_PRIVATE_KEY }}
        shell: bash
        working-directory: worker_flutter
        run: |
          if [ -z "$SPARKLE_DSA_PRIVATE_KEY" ]; then
            echo "::error::SPARKLE_DSA_PRIVATE_KEY is unset" >&2
            exit 1
          fi
          KEY_FILE=$(mktemp)
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s' "$SPARKLE_DSA_PRIVATE_KEY" > "$KEY_FILE"
          ZIP=build/worker_flutter-windows.zip
          LEN=$(wc -c < "$ZIP")
          SIG=$(openssl dgst -sha1 -binary < "$ZIP" \
            | openssl dgst -sha1 -sign "$KEY_FILE" \
            | openssl enc -base64 -A)
          if [ -z "$SIG" ]; then
            echo "::error::DSA signing produced an empty signature" >&2
            exit 1
          fi
          echo "WinSparkle signature: $SIG (length: $LEN)"
          jq -n --arg sig "$SIG" --arg len "$LEN" --arg ref "$GITHUB_REF_NAME" \
            '{tag: $ref, dsaSignature: $sig, length: ($len|tonumber)}' \
            > build/sparkle-manifest-windows.json
          cat build/sparkle-manifest-windows.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: magic-bracket-simulator-windows
          path: |
            worker_flutter/build/worker_flutter-windows.zip
            worker_flutter/build/sparkle-manifest-windows.json
          if-no-files-found: error

      - name: Attach to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/worker-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            worker_flutter/build/worker_flutter-windows.zip
            worker_flutter/build/sparkle-manifest-windows.json
          fail_on_unmatched_files: true
