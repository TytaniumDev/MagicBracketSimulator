name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    name: CI / Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            api/package-lock.json
            worker/package-lock.json

      - run: ./scripts/lint.sh

  build:
    name: CI / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            api/package-lock.json
            worker/package-lock.json

      - uses: actions/cache@v4
        with:
          path: api/.next/cache
          key: nextjs-${{ hashFiles('api/package-lock.json') }}-${{ hashFiles('api/**/*.ts', 'api/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ hashFiles('api/package-lock.json') }}-

      - run: ./scripts/build.sh

  test:
    name: CI / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            api/package-lock.json
            worker/package-lock.json

      - run: ./scripts/test.sh

  release-scripts:
    name: CI / Release scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        # Stdlib-only — no pip install needed.
        run: ./scripts/test-release-scripts.sh
