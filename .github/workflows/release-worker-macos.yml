name: Release magic-bracket-simulator (macOS)

# Triggered manually or on push of a tag matching `worker-v*` (e.g.
# `worker-v0.1.0`). Builds, signs, and notarizes the .app, then
# uploads the zipped artifact to the workflow run and attaches it to
# the GitHub Release for the tag.
#
# Secrets pattern mirrors BlinkBreak's deploy-testflight.yml: only
# DOPPLER_BLINKBREAK_TOKEN is a GitHub Actions secret (a service token
# scoped to Doppler project "blinkbreak", config "prd"). Everything
# else (match password, ASC API key, certs-repo SSH key) comes from
# Doppler. The repo's other workflows use DOPPLER_TOKEN scoped to
# magic-bracket-simulator — this workflow needs a separately-scoped
# token because the signing secrets live in BlinkBreak's Doppler config.

on:
  workflow_dispatch:
  push:
    tags:
      - "worker-v*"

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Load secrets from Doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_BLINKBREAK_TOKEN }}
        run: |
          DELIM=$(openssl rand -hex 16)
          # Service token is scoped to blinkbreak/prd, but still pass the
          # flags explicitly — without them, the CLI tries to use a local
          # Doppler config that doesn't exist on a fresh runner and the
          # request 401s as "Invalid Auth token".
          SECRETS=$(doppler secrets download --project blinkbreak --config prd --no-file --format json)
          KEYS='[
            "MATCH_PASSWORD",
            "MATCH_SSH_PRIVATE_KEY",
            "MATCH_KEYCHAIN_PASSWORD",
            "ASC_KEY_ID",
            "ASC_ISSUER_ID",
            "ASC_API_KEY_CONTENT",
            "ASC_API_KEY_IS_BASE64"
          ]'
          # Mask every value before using it.
          echo "$SECRETS" | jq -r --argjson keys "$KEYS" '
            to_entries[] | select(.key | IN($keys[])) | .value
          ' | while IFS= read -r val; do
            [ -n "$val" ] && echo "::add-mask::$val"
          done
          # Write into $GITHUB_ENV with a random heredoc delimiter so multi-line
          # values (RSA/ED25519 private key, base64 .p8, etc.) survive intact.
          echo "$SECRETS" | jq -r --argjson keys "$KEYS" --arg d "$DELIM" '
            to_entries[] | select(.key | IN($keys[])) | "\(.key)<<\($d)\n\(.value)\n\($d)"
          ' >> "$GITHUB_ENV"

      - name: Install SSH deploy key for certs repo
        env:
          MATCH_SSH_PRIVATE_KEY: ${{ env.MATCH_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$MATCH_SSH_PRIVATE_KEY" > ~/.ssh/match_deploy_key
          chmod 600 ~/.ssh/match_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          # 3.3+ required: fastlane 2.234.0 fails ES256 key parsing on
          # Ruby 3.2's bundled OpenSSL with "invalid curve name", and
          # fastlane upstream is dropping 3.2 support shortly anyway.
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: worker_flutter/macos

      - name: Install CocoaPods into active Ruby
        # macos-14 runners ship with a system CocoaPods tied to system
        # Ruby. ruby/setup-ruby swaps PATH to Ruby 3.2, which makes
        # the pre-installed pod unrunnable — Flutter then prints
        # "CocoaPods is installed but broken. Skipping pod install."
        # mid-build and fails. Reinstalling cocoapods into the active
        # Ruby keeps a working pod on PATH for flutter build macos.
        run: gem install cocoapods

      - name: flutter pub get
        working-directory: worker_flutter
        run: flutter pub get

      - name: Pod install
        working-directory: worker_flutter/macos
        run: pod install --repo-update

      - name: Fastlane release (sign + notarize)
        working-directory: worker_flutter/macos
        env:
          MATCH_PASSWORD: ${{ env.MATCH_PASSWORD }}
          MATCH_KEYCHAIN_PASSWORD: ${{ env.MATCH_KEYCHAIN_PASSWORD }}
          ASC_KEY_ID: ${{ env.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ env.ASC_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ env.ASC_API_KEY_CONTENT }}
          ASC_API_KEY_IS_BASE64: ${{ env.ASC_API_KEY_IS_BASE64 }}
          FASTLANE_HIDE_CHANGELOG: "1"
          FASTLANE_SKIP_UPDATE_CHECK: "1"
          FASTLANE_DISABLE_COLORS: "1"
          # Force match's git operations to use the deploy key, regardless of
          # the runner's default SSH config.
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/match_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
        run: bundle exec fastlane release

      - name: Sign zip for Sparkle (EdDSA)
        # sign_update ships with the Sparkle CocoaPod (Pods/Sparkle/bin).
        # The output is "sparkle:edSignature=... length=..." — exactly the
        # attributes the appcast <enclosure> tag needs. We write a small
        # manifest JSON alongside the zip so the appcast-update step (or
        # a human pasting into appcast.xml) doesn't have to parse the
        # raw stdout.
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        working-directory: worker_flutter
        run: |
          if [ -z "$SPARKLE_ED_PRIVATE_KEY" ]; then
            echo "::error::SPARKLE_ED_PRIVATE_KEY is unset — release would produce an unsigned update Sparkle 2 refuses to install" >&2
            exit 1
          fi
          ZIP=build/worker_flutter-macos.zip
          SIGN_UPDATE=macos/Pods/Sparkle/bin/sign_update
          # sign_update emits: sparkle:edSignature="..." length="..."
          # Stream the secret on stdin so it never lands in `ps` output.
          SIG_LINE=$(printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | "$SIGN_UPDATE" --ed-key-file - "$ZIP")
          echo "Sparkle signature line: $SIG_LINE"
          ED_SIG=$(echo "$SIG_LINE" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          LEN=$(echo "$SIG_LINE" | sed -n 's/.*length="\([^"]*\)".*/\1/p')
          if [ -z "$ED_SIG" ] || [ -z "$LEN" ]; then
            echo "::error::Failed to parse sign_update output: $SIG_LINE" >&2
            exit 1
          fi
          jq -n --arg sig "$ED_SIG" --arg len "$LEN" --arg ref "$GITHUB_REF_NAME" \
            '{tag: $ref, edSignature: $sig, length: ($len|tonumber)}' \
            > build/sparkle-manifest.json
          cat build/sparkle-manifest.json

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: magic-bracket-simulator-macos
          path: |
            worker_flutter/build/worker_flutter-macos.zip
            worker_flutter/build/sparkle-manifest.json
          if-no-files-found: error

      - name: Attach to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/worker-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            worker_flutter/build/worker_flutter-macos.zip
            worker_flutter/build/sparkle-manifest.json
          fail_on_unmatched_files: true
