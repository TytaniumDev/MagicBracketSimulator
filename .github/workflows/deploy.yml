# Deploy Firebase services on push to main (after PR merge).
#
# What gets deployed here:
#   - Hosting (frontend SPA)
#   - Firestore (rules + indexes)
#
# What deploys automatically (NOT from this workflow):
#   - App Hosting (API) — auto-deploys via Firebase's GitHub connection on push
#
# Auth: Workload Identity Federation (keyless, short-lived credentials).
# Setup: see agent-plans/workload-identity-federation-setup.md
#
# Secrets are fetched from Doppler at runtime (project: magic-bracket-simulator, config: dev).
# Only DOPPLER_TOKEN is stored as a GitHub secret for bootstrapping.
name: Deploy Firebase

on:
  push:
    branches: [main]

# Prevent overlapping deploys; queue the latest push, never cancel in-progress.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # Required for Workload Identity Federation OIDC exchange

jobs:
  # ── Gate: reuse the CI workflow for lint / build / test ────────────────
  ci:
    uses: ./.github/workflows/ci.yml

  # ── Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: ci
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Load Doppler secrets
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          # Fetch only the secrets this job needs (least-privilege)
          SECRETS_FILE=$(mktemp)
          trap 'rm -f "$SECRETS_FILE"' EXIT
          doppler secrets get \
            GCP_WORKLOAD_IDENTITY_PROVIDER GCP_SERVICE_ACCOUNT \
            VITE_FIREBASE_API_KEY VITE_FIREBASE_AUTH_DOMAIN \
            VITE_FIREBASE_PROJECT_ID VITE_FIREBASE_STORAGE_BUCKET \
            VITE_FIREBASE_MESSAGING_SENDER_ID VITE_FIREBASE_APP_ID \
            --no-file --format json > "$SECRETS_FILE"

          # Mask all secret values so they don't leak in logs
          jq -r '.[]' "$SECRETS_FILE" | while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done

          # Export to GITHUB_ENV with a random delimiter to prevent injection
          EOF_MARKER="$(openssl rand -hex 16)"
          jq -r --arg eof "$EOF_MARKER" '
            to_entries[] | "\(.key)<<\($eof)\n\(.value)\n\($eof)"
          ' "$SECRETS_FILE" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: magic-bracket-simulator
          workload_identity_provider:
            ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ env.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ env.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ env.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:
            ${{ env.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID:
            ${{ env.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ env.VITE_FIREBASE_APP_ID }}

      - name: Deploy Hosting & Firestore
        run: npx firebase-tools@latest deploy --only hosting,firestore --force
