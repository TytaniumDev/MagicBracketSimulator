name: Nightly Forge Update

on:
  schedule:
    - cron: '0 6 * * *' # 6 AM UTC daily
  workflow_dispatch:

jobs:
  check-and-build:
    name: Check for new Forge release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      rebuilt: ${{ steps.check.outputs.rebuilt }}
      forge_version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Resolve latest Forge version
        id: resolve
        run: ./scripts/resolve-forge-version.sh

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: |
          REPO_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "SIMULATION_IMAGE=ghcr.io/${REPO_LOWER}/simulation" >> $GITHUB_ENV

      - name: Check if tag already exists
        id: check
        env:
          FORGE_VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          if docker manifest inspect "${SIMULATION_IMAGE}:forge-${FORGE_VERSION}" > /dev/null 2>&1; then
            echo "Tag forge-${FORGE_VERSION} already exists, no rebuild needed"
            echo "rebuilt=false" >> $GITHUB_OUTPUT
          else
            echo "Tag forge-${FORGE_VERSION} not found, rebuild needed"
            echo "rebuilt=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.check.outputs.rebuilt == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.rebuilt == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push simulation image
        if: steps.check.outputs.rebuilt == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./simulation/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            FORGE_VERSION=${{ steps.resolve.outputs.version }}
          tags: |
            ${{ env.SIMULATION_IMAGE }}:latest
            ${{ env.SIMULATION_IMAGE }}:forge-${{ steps.resolve.outputs.version }}

  notify-workers:
    name: Notify workers to pull new image
    needs: check-and-build
    if: needs.check-and-build.outputs.rebuilt == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Load Doppler secrets
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: ./scripts/load-doppler-secrets.sh API_URL WORKER_SECRET

      - name: Notify workers
        continue-on-error: true
        env:
          API_URL: ${{ env.API_URL }}
          WORKER_SECRET: ${{ env.WORKER_SECRET }}
        run: ./scripts/notify-workers.sh
