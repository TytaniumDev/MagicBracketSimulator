name: worker_flutter
description: "Magic Bracket Simulator desktop worker (macOS)."
publish_to: 'none'
# MAJOR.MINOR (`0.2`) is read by .github/workflows/release-worker.yml
# to drive the next release version — CI bumps the PATCH automatically
# from the most recent `worker-v*` git tag. Bump MAJOR or MINOR here
# when you want the next release to start a new line (e.g. 0.3.0).
# The `+1` build number is cosmetic; CI overrides it with the workflow
# run number via `--build-number`.
version: 0.2.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase + Firestore for job queue and lease writes
  firebase_core: ^3.10.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.3.0
  flutter_secure_storage: ^9.2.2

  # App Check attests that API requests come from the legitimate app
  # rather than a script with a stolen ID token. Only macOS is wired up
  # — firebase_app_check has no Windows desktop support, so the Windows
  # build skips activation and falls back to the run-locally path.
  firebase_app_check: ^0.3.2

  # Native window + tray
  tray_manager: ^0.5.2
  window_manager: ^0.4.3

  # Local config + ID generation
  path_provider: ^2.1.4
  shared_preferences: ^2.3.3
  uuid: ^4.5.1

  # Reactive state
  rxdart: ^0.28.0

  # First-run installer downloads (JRE + Forge)
  http: ^1.2.2

  # SHA-256 verification of downloaded Forge bundles before extract.
  crypto: ^3.0.5

  # macOS app self-update (Sparkle wrapper).
  auto_updater: ^1.0.0

  # Launch-at-login: macOS Login Items + Windows Startup folder.
  # Cross-platform; uses each OS's native auto-start mechanism so the
  # worker comes back online after a reboot without user intervention.
  launch_at_startup: ^0.5.1
  # Read appName/packageName at runtime so launch_at_startup's setup
  # call doesn't need hardcoded strings that drift from the Xcode /
  # Runner.rc metadata.
  package_info_plus: ^8.0.2

  # Google Sign-In:
  # - macOS: `firebase_auth.signInWithProvider(GoogleAuthProvider())`
  #   uses ASWebAuthenticationSession natively.
  # - Windows: firebase_auth's `signInWithProvider` throws
  #   "Operation is not supported on non-mobile systems", so we drive
  #   the OAuth2 PKCE flow ourselves through the system browser via
  #   `url_launcher` and hand the resulting Google ID token back to
  #   firebase_auth via `signInWithCredential`. Needs a Desktop-type
  #   OAuth Client ID in addition to the iOS one.
  url_launcher: ^6.3.0

  # Offline-mode local persistence (drift = type-safe SQLite for Flutter).
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0

  # Crash + session reporting. DSN is provided at build time via
  # --dart-define=SENTRY_DSN=... — empty DSN puts the SDK in no-op
  # mode, which is exactly what dev builds want.
  sentry_flutter: ^8.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.13
  drift_dev: ^2.20.0
  fake_cloud_firestore: ^3.1.0
  firebase_auth_mocks: ^0.14.1
  # Uploads Dart obfuscation debug-info + sources to Sentry so
  # production stack traces deobfuscate. Driven by the
  # `sentry:` config block below; no-ops without $SENTRY_AUTH_TOKEN.
  sentry_dart_plugin: ^2.0.0

flutter:
  uses-material-design: true
  config:
    # Force CocoaPods — sentry_flutter 8.14.2's Package.swift uses `from: "8.46.0"` and resolves a newer Sentry-Cocoa missing SentryBinaryImageCache.image(byAddress:); its Podspec pins exactly 8.46.0.
    enable-swift-package-manager: false
  assets:
    # Bundled Forge precons — copied verbatim from
    # `worker/forge-engine/decks/` so offline mode works out of the
    # box without a Forge install or a network round-trip. The
    # offline runner extracts these to the user's app-support dir on
    # demand (see `lib/offline/deck_source.dart`).
    - assets/precons/
  # Tray icons: .ico for Windows, .png for macOS/Linux.
    - assets/tray_icon.ico

# sentry_dart_plugin config — runs during CI release builds to upload
# the obfuscation debug-info directory + Dart sources to Sentry so
# stack traces deobfuscate. `release` is read from the
# $SENTRY_RELEASE env var the release workflow sets; `auth_token`
# from $SENTRY_AUTH_TOKEN. Both unset locally → plugin no-ops.
sentry:
  project: magic-bracket-worker
  org: tytaniumdev
  upload_debug_symbols: true
  upload_source_maps: false
  upload_sources: true
  log_level: info
