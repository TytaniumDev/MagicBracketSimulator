name: worker_flutter
description: "Magic Bracket Simulator desktop worker (macOS)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase + Firestore for job queue and lease writes
  firebase_core: ^3.10.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.3.0

  # Native window + tray
  tray_manager: ^0.5.2
  window_manager: ^0.4.3

  # Local config + ID generation
  path_provider: ^2.1.4
  shared_preferences: ^2.3.3
  uuid: ^4.5.1

  # Reactive state
  rxdart: ^0.28.0

  # First-run installer downloads (JRE + Forge)
  http: ^1.2.2

  # SHA-256 verification of downloaded Forge bundles before extract.
  crypto: ^3.0.5

  # macOS app self-update (Sparkle wrapper).
  auto_updater: ^1.0.0

  # Google Sign-In (cloud mode). google_sign_in v6 supports macOS via
  # the system's keychain-backed OAuth flow; on Windows we fall back
  # to the manual browser+localhost-callback flow below. The
  # firebase_auth REST path is the only way to get a Firestore-ready
  # idToken without invoking firebase_auth_macos's native plugin
  # (which crashes on boot for several common Firebase configs — see
  # main.dart#_bootEngine).
  google_sign_in: ^6.2.1
  url_launcher: ^6.3.0

  # Offline-mode local persistence (drift = type-safe SQLite for Flutter).
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.13
  drift_dev: ^2.20.0
  fake_cloud_firestore: ^3.1.0
  firebase_auth_mocks: ^0.14.1

flutter:
  uses-material-design: true
  # Tray icon asset goes here once you have a 16x16 PNG ready:
  # assets:
  #   - assets/tray_icon.png
