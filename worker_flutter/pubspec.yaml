name: worker_flutter
description: "Magic Bracket Simulator desktop worker (macOS)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase + Firestore for job queue and lease writes
  firebase_core: ^3.10.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.3.0

  # Native window + tray
  tray_manager: ^0.5.2
  window_manager: ^0.4.3

  # Local config + ID generation
  path_provider: ^2.1.4
  shared_preferences: ^2.3.3
  uuid: ^4.5.1

  # Reactive state
  rxdart: ^0.28.0

  # First-run installer downloads (JRE + Forge)
  http: ^1.2.2

  # SHA-256 verification of downloaded Forge bundles before extract.
  crypto: ^3.0.5

  # macOS app self-update (Sparkle wrapper).
  auto_updater: ^1.0.0

  # Google Sign-In runs through `firebase_auth.signInWithProvider` —
  # works on every platform (macOS via ASWebAuthenticationSession,
  # Windows/Linux via system-browser + localhost callback) without a
  # separate `google_sign_in` dep. The iOS-type OAuth Client ID in
  # `firebase_options.dart` serves the macOS native flow; Windows
  # reuses the same Firebase project's federated config.

  # Offline-mode local persistence (drift = type-safe SQLite for Flutter).
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.13
  drift_dev: ^2.20.0
  fake_cloud_firestore: ^3.1.0
  firebase_auth_mocks: ^0.14.1

flutter:
  uses-material-design: true
  # Tray icon asset goes here once you have a 16x16 PNG ready:
  # assets:
  #   - assets/tray_icon.png
